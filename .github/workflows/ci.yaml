name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "docs/**"
      - "infra/**"
      - "README.md"
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.ref }}/ci
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  # ── 2. Unit tests ──────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: |
          mkdir -p /tmp/dagster_home
          uv run pytest tests/ -v --tb=short
        env:
          DAGSTER_HOME: /tmp/dagster_home
          GCP_PROJECT_ID: "test-project"
          GCS_BUCKET_NAME: "test-bucket"
          BIGQUERY_DATASET: "test_dataset"
          BIGQUERY_LOCATION: "US"

  # ── 3. Validate Dagster definitions ────────────────────────────────────────
  validate-definitions:
    name: Validate Dagster Definitions
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Validate Dagster definitions
        run: |
          mkdir -p /tmp/dagster_home
          uv run dagster definitions validate -m quickstart_etl.definitions
        env:
          DAGSTER_HOME: /tmp/dagster_home
          # Dummy values — validate only checks import-time correctness,
          # it never connects to GCP or any external service
          GCP_PROJECT_ID: "test-project"
          GCS_BUCKET_NAME: "test-bucket"
          BIGQUERY_DATASET: "test_dataset"
          BIGQUERY_LOCATION: "EU"

  # ── 4. Deploy to Dagster+ Serverless (main branch only) ────────────────────
  # dagster-cloud serverless deploy reads dagster_cloud.yaml and uploads a PEX.
  # No custom Docker image — Dagster manages the execution environment entirely.
  deploy:
    name: Deploy to Dagster+ Serverless
    runs-on: ubuntu-22.04
    needs: [test, validate-definitions]
    if: github.ref == 'refs/heads/main'
    env:
      DAGSTER_CLOUD_API_TOKEN: ${{ secrets.DAGSTER_CLOUD_API_TOKEN }}
      DAGSTER_CLOUD_ORGANIZATION: mevmav
      DAGSTER_CLOUD_DEPLOYMENT: prod
      DAGSTER_CLOUD_URL: https://mevmav.eu.dagster.cloud/
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dagster-cloud CLI
        run: uv tool install dagster-cloud-cli

      - name: Deploy to Dagster+ Serverless
        run: |
          dagster-cloud serverless deploy \
            --location-name portfolio_demand_forecasting_and_dynamic_pricing \
            --module-name quickstart_etl.definitions \
            --working-directory ./src \
            --python-version ${{ env.PYTHON_VERSION }} \
            --deployment prod

