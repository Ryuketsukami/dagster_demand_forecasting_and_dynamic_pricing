name: CI / CD

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "docs/**"
      - "infra/**"
      - "README.md"
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.ref }}/ci
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"
  # Docker image pushed to GitHub Container Registry (free, no extra credentials needed)
  IMAGE: ghcr.io/${{ github.repository }}
  # Dagster Cloud — used only by the deploy job (main branch only)
  DAGSTER_CLOUD_URL: https://mevmav.eu.dagster.cloud/
  DAGSTER_CLOUD_API_TOKEN: ${{ secrets.DAGSTER_CLOUD_API_TOKEN }}

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  # ── 2. Unit tests ──────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgomp1

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: |
          mkdir -p /tmp/dagster_home
          uv run pytest tests/ -v --tb=short
        env:
          DAGSTER_HOME: /tmp/dagster_home
          GCP_PROJECT_ID: "test-project"
          GCS_BUCKET_NAME: "test-bucket"
          BIGQUERY_DATASET: "test_dataset"
          BIGQUERY_LOCATION: "US"

  # ── 3. Validate Dagster definitions ────────────────────────────────────────
  validate-definitions:
    name: Validate Dagster Definitions
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgomp1

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Validate Dagster definitions
        run: |
          mkdir -p /tmp/dagster_home
          uv run dagster definitions validate -m quickstart_etl.definitions
        env:
          DAGSTER_HOME: /tmp/dagster_home
          # Dummy values — validate only checks import-time correctness,
          # it never connects to GCP or any external service
          GCP_PROJECT_ID: "test-project"
          GCS_BUCKET_NAME: "test-bucket"
          BIGQUERY_DATASET: "test_dataset"
          BIGQUERY_LOCATION: "EU"

  # ── 4. Build & push Docker image ───────────────────────────────────────────
  # Runs on every branch so branch images are available for Dagster+ branch deployments.
  # The deploy job below gates actual promotion to main only.
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-22.04
    needs: [test, validate-definitions]
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # Full SHA tag for exact traceability
            type=sha,format=long
            # Branch-based rolling tag (e.g. main, feature-xyz)
            type=ref,event=branch
            # latest only on main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache via GitHub Actions cache — speeds up repeated builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. Deploy to Dagster+ (main branch only) ───────────────────────────────
  # Uses dagster-cloud-cli to register the GHCR image we built above with Dagster Cloud.
  # This bypasses the PEX builder entirely — correct for custom-Dockerfile deployments.
  deploy:
    name: Deploy to Dagster+
    runs-on: ubuntu-22.04
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dagster-cloud CLI
        run: uv tool install dagster-cloud-cli

      - name: Initialise Dagster Cloud CI deployment
        run: dagster-cloud ci init --deployment prod --statedir /tmp/build

      - name: Register Docker image with code location
        run: >
          dagster-cloud ci set-build-output
          --location-name portfolio_demand_forecasting_and_dynamic_pricing
          --image-tag ${{ env.IMAGE }}:sha-${{ github.sha }}
          --statedir /tmp/build

      - name: Deploy
        run: dagster-cloud ci deploy --statedir /tmp/build
